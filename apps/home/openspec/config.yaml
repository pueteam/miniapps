schema: spec-driven

# Project context
context: |
  Tech stack: TypeScript, Preact, Vite, PWA
  Monorepo: @miniapps/home (launcher/índice), @miniapps/planning-board, tooling/create-miniapp
  Package manager: npm
  Build: Vite with PWA plugin

  ## App-specific context
  - This app acts as the home/launcher showing available miniapps
  - Consumes generated `src/generated/apps-registry.ts` (generated by `scripts/generate-home-registry.mjs`)
  - Uses `app.config.json` contract with fields: name, title, description, listed, pwa, router, themeColor, backgroundColor
  - Applies PUEDATA base visual system (tokens, semantic typography, spacing, radius)
  - Separates runtime soft background from manifest neutral backgroundColor (#FFFFFF)
  - PWA-enabled with install UI (beforeinstallprompt handling)

# Per-artifact rules
rules:
  proposal:
    - Keep proposals under 500 words
  tasks:
    - Break tasks into chunks of max 2 hours